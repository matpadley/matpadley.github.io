baseURL = "https://matpadley.github.io/"
title = "Mathew Padley"
languageCode = "en-us"
theme = "adritian-free-hugo-theme"

[pagination]
pagerSize = 6

# Exclude footer section from generating list pages (index.html and index.xml)
[outputs]
  page = ["HTML"]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
  footer = []

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"
  topic = "topics"

# Explicitly prevent the footer section from generating any output
[outputFormats.footerSection]

disableKinds = ["footerSection"]

[module]
[[module.mounts]]
source = "archetypes"
target = "archetypes"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "i18n"
target = "i18n"

[[module.mounts]]
source = "layouts"
target = "layouts"

[[module.mounts]]
source = "static"
target = "static"

# Required so the theme can load Bootstrap from npm
[[module.mounts]]
source = "node_modules/bootstrap/scss"
target = "assets/scss/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js"
target = "assets/js/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"
target = "assets/js/vendor/bootstrap.bundle.min.js"

[[module.mounts]]
source = "node_modules/bootstrap-print-css/css/bootstrap-print.css"
target = "assets/css/bootstrap-print.css"


[params]
title = "Mathew Padley"
description = "Mathew Padley - CV & Articles"
themeColor = "#478079"

# Color scheme: default | ocean | forest | rose | slate | midnight | warm
colorScheme = "default"

[params.colorSchemeSwitcher]
enable = true

[params.colorSchemeSwitcher.selector.disable]
footer = false
header = false

[params.seo]
siteName = "Mathew Padley"
siteDescription = "Mathew Padley - CV & Articles"

[params.seo.person]
name = "Mathew Padley"
url = "https://matpadley.github.io"
sameAs = ["https://github.com/matpadley"]
sections = ["about", "education", "experience", "contact"]

[params.favicons]
source = "icons/favicon.png"

[params.blog]
layout = "sidebar-right"
sidebarWidth = "25"
narrowContent = true
showCategories = true
showRecentPosts = true
recentPostCount = 5
listStyle = "summary"
listLayout = "default"
featured_sort_by_weight = true
featured_sort_by_date = false

[params.experience]
showJobCard = true

[params.navbarOverflow]
mode = "dropdown"

# Endpoint the /contact form (layouts/shortcodes/contact-form.html) POSTs to.
# Set this to the deployed Azure Function URL; the form fails gracefully while empty.
[params.contact]
endpoint = ""

[params.colorTheme]
[params.colorTheme.selector.disable]
footer = false
header = false
mobileHeader = false

[params.languages.selector.disable]
footer = false
header = false
mobileHeader = false


name: Deploy contact function

# Manual only, by design - this provisions/updates real billed Azure resources and should never
# fire on a routine push. See AZURE_SETUP_TODO.md for the one-time setup this depends on.
on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep)
        id: infra
        run: |
          set -euo pipefail
          outputs=$(az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters contactRecipientEmail="${{ secrets.CONTACT_RECIPIENT_EMAIL }}" \
            --query properties.outputs -o json)
          echo "functionAppName=$(echo "$outputs" | jq -r '.functionAppName.value')" >> "$GITHUB_OUTPUT"
          echo "functionAppUrl=$(echo "$outputs" | jq -r '.functionAppUrl.value')" >> "$GITHUB_OUTPUT"

      - name: Publish function code
        run: dotnet publish api/ContactFunction/ContactFunction.csproj -c Release -o publish_output

      - name: Zip package
        run: |
          cd publish_output
          zip -r ../function.zip . -x '*.pdb'

      - name: Deploy function code
        # `az functionapp deploy` (OneDeploy) sends Content-Type: application/octet-stream to
        # /api/publish?type=zip, which Flex Consumption's Kudu rejects with 415. config-zip has a
        # dedicated Flex Consumption code path (application/zip content type) and is what Microsoft's
        # own docs recommend for this plan - see https://learn.microsoft.com/azure/azure-functions/flex-consumption-how-to
        #
        # config-zip's own post-upload health check (fetching the host master key over ARM) can
        # transiently fail right after the RBAC role assignments in rbac.bicep are created in the
        # same run - propagation can lag a minute or so, and the CLI's fixed 60s wait isn't always
        # enough. The zip upload + sync-triggers themselves (logged before the health check) still
        # succeed, so retry the command rather than failing the whole deploy on that trailing check.
        run: |
          for attempt in 1 2 3; do
            if az functionapp deployment source config-zip \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ steps.infra.outputs.functionAppName }}" \
              --src function.zip; then
              exit 0
            fi
            echo "Deploy attempt $attempt failed, retrying in 60s..." >&2
            sleep 60
          done
          echo "Deploy failed after 3 attempts" >&2
          exit 1

      - name: Summary
        run: |
          {
            echo "### Contact function deployed"
            echo ""
            echo "Function app: \`${{ steps.infra.outputs.functionAppName }}\`"
            echo ""
            echo "Endpoint (paste into \`hugo.toml\`'s \`params.contact.endpoint\`):"
            echo ""
            echo "\`\`\`"
            echo "${{ steps.infra.outputs.functionAppUrl }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
